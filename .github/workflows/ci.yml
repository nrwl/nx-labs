name: CI
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

env:
  NX_CLOUD_ACCESS_TOKEN: ${{secrets.NX_CLOUD_ACCESS_TOKEN}}

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: tree:0

      - run: npx nx-cloud start-ci-run --distribute-on="5 linux-large" --stop-agents-after="e2e"

      - name: Setup dev tools with mise
        uses: jdx/mise-action@146a28175021df8ca24f8ee1828cc2a60f980bd5 # v3

      - name: Install dependencies with bun
        run: bun install --frozen-lockfile

      - name: Debug native module loading
        run: |
          echo "=== Node version ==="
          node --version
          echo "=== Check native package ==="
          ls -la node_modules/@nx/nx-linux-x64-gnu/ 2>/dev/null || echo "MISSING: @nx/nx-linux-x64-gnu"
          ls -la node_modules/@nx/nx-linux-x64-musl/ 2>/dev/null || echo "MISSING: @nx/nx-linux-x64-musl"
          echo "=== Check native files in nx package ==="
          ls -la node_modules/nx/dist/src/native/*.node 2>/dev/null || echo "No .node files in nx/dist/src/native/"
          echo "=== Try loading native module ==="
          node -e "
            try {
              const binding = require('./node_modules/nx/dist/src/native/native-bindings.js');
              console.log('native-bindings loaded, WorkspaceContext:', typeof binding.WorkspaceContext);
              console.log('IS_WASM:', binding.IS_WASM);
            } catch(e) {
              console.log('native-bindings FAILED:', e.message);
              console.log('cause:', e.cause);
            }
          "
          echo "=== Try loading platform binary directly ==="
          node -e "
            try {
              const b = require('@nx/nx-linux-x64-gnu');
              console.log('gnu binding loaded, keys:', Object.keys(b).slice(0,10), '...');
              console.log('WorkspaceContext:', typeof b.WorkspaceContext);
            } catch(e) { console.log('gnu FAILED:', e.message); }
            try {
              const b = require('@nx/nx-linux-x64-musl');
              console.log('musl binding loaded');
            } catch(e) { console.log('musl FAILED:', e.message); }
          "
          echo "=== ldd check ==="
          ldd --version 2>&1 | head -1 || true

      - uses: nrwl/nx-set-shas@v5

      - run: bunx nx-cloud record -- nx format:check
      - run: bunx nx-cloud record -- nx sync:check

      - run: bunx nx run-many -t lint test build
      - run: bunx nx run-many -t e2e --exclude=nx-ignore-e2e

      - name: Self-healing
        run: bunx nx fix-ci
        if: always()
